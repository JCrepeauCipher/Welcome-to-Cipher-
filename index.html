<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CipherHealth · New Hire Welcome Cards</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Merriweather:ital,wght@0,500;0,600;1,500;1,600&display=swap" rel="stylesheet">
<style>
  :root {
    --anchor: #2D2660;
    --violet: #5B4FB5;
    --teal: #00B4A4;
    --chartreuse: #B5CC2E;
    --amber: #E8A020;
    --lavender: #F2F1F9;
    --teal-tint: #D0F4F1;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: var(--lavender); color: var(--anchor); min-height: 100vh; }
  .app { display: grid; grid-template-columns: 400px 1fr; min-height: 100vh; }

  /* ---------- Sidebar ---------- */
  .sidebar { background: var(--anchor); color: var(--lavender); padding: 28px 26px 36px; display: flex; flex-direction: column; gap: 22px; overflow-y: auto; }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand .spark { flex-shrink: 0; }
  .brand h1 { font-size: 16px; font-weight: 600; color: #fff; }
  .brand p { font-size: 11.5px; color: rgba(242,241,249,0.65); margin-top: 2px; }

  /* mode toggle */
  .mode { display: flex; background: rgba(242,241,249,0.08); border-radius: 10px; padding: 4px; gap: 4px; }
  .mode button { flex: 1; background: none; border: none; color: rgba(242,241,249,0.7); font-family: inherit; font-size: 13px; font-weight: 500; padding: 9px; border-radius: 7px; cursor: pointer; transition: background 0.15s, color 0.15s; }
  .mode button.active { background: var(--teal); color: #fff; }

  .field label { display: block; font-size: 11px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; color: var(--chartreuse); margin-bottom: 8px; }
  .field .sub { opacity: 0.55; font-weight: 400; text-transform: none; letter-spacing: 0; }
  .field .hint { font-size: 11px; color: rgba(242,241,249,0.55); margin-top: 6px; font-weight: 400; letter-spacing: 0; text-transform: none; }
  input[type="text"] { width: 100%; background: rgba(242,241,249,0.08); border: 1px solid rgba(242,241,249,0.22); border-radius: 8px; padding: 11px 13px; color: #fff; font-family: inherit; font-size: 14px; outline: none; transition: border-color 0.15s, background 0.15s; }
  input[type="text"]::placeholder { color: rgba(242,241,249,0.4); }
  input[type="text"]:focus { border-color: var(--teal); background: rgba(0,180,164,0.08); }

  .templates { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .tpl { border: 2px solid rgba(242,241,249,0.18); border-radius: 10px; padding: 8px; cursor: pointer; background: rgba(242,241,249,0.04); transition: border-color 0.15s, background 0.15s; text-align: left; }
  .tpl:hover { border-color: rgba(0,180,164,0.6); }
  .tpl.active { border-color: var(--chartreuse); background: rgba(181,204,46,0.08); }
  .tpl .thumb { width: 100%; aspect-ratio: 1; border-radius: 6px; margin-bottom: 7px; position: relative; overflow: hidden; }
  .tpl .tname { font-size: 11.5px; font-weight: 500; color: var(--lavender); }
  .thumb.t-dark { background: var(--anchor); }
  .thumb.t-dark::before { content:''; position:absolute; top:-14px; right:-14px; width:40px; height:40px; border-radius:50%; background:rgba(0,180,164,0.35); }
  .thumb.t-dark::after { content:''; position:absolute; bottom:12px; left:50%; transform:translateX(-50%); width:22px; height:22px; border-radius:50%; background:var(--violet); border:2px solid var(--teal); }
  .thumb.t-light { background: var(--lavender); }
  .thumb.t-light::before { content:''; position:absolute; bottom:-16px; left:-16px; width:44px; height:44px; border-radius:50%; background:rgba(0,180,164,0.22); }
  .thumb.t-light::after { content:''; position:absolute; bottom:12px; left:12px; width:20px; height:20px; border-radius:50%; background:var(--violet); }
  .thumb.t-split { background: linear-gradient(90deg, var(--anchor) 48%, var(--violet) 48%); }
  .thumb.t-split::after { content:''; position:absolute; top:50%; left:71%; transform:translate(-50%,-50%); width:22px; height:22px; border-radius:50%; background:var(--lavender); }
  .thumb.t-orbit { background: var(--lavender); }
  .thumb.t-orbit::before { content:''; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:34px; height:34px; border-radius:50%; border:2px solid rgba(91,79,181,0.5); }
  .thumb.t-orbit::after { content:''; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:20px; height:20px; border-radius:50%; background:var(--anchor); }

  .drop { border: 1.5px dashed rgba(242,241,249,0.35); border-radius: 10px; padding: 16px 14px; text-align: center; cursor: pointer; transition: border-color 0.15s, background 0.15s; font-size: 13px; color: rgba(242,241,249,0.75); }
  .drop:hover, .drop.over { border-color: var(--teal); background: rgba(0,180,164,0.08); }
  .drop strong { color: var(--teal); font-weight: 600; }
  .drop .preview-row { display: flex; align-items: center; gap: 12px; text-align: left; }
  .drop .preview-row img { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; border: 2px solid var(--teal); flex-shrink: 0; }
  .drop .preview-row .fname { font-size: 12.5px; color: #fff; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .drop .preview-row .swap { font-size: 11px; color: rgba(242,241,249,0.6); margin-top: 2px; }
  .clear-photo { background: none; border: none; color: rgba(242,241,249,0.6); font-size: 16px; cursor: pointer; margin-left: auto; padding: 4px 6px; line-height: 1; }
  .clear-photo:hover { color: #fff; }
  .file-in { display: none; }

  /* roster (class mode) */
  .roster { display: flex; flex-direction: column; gap: 8px; }
  .roster-item { display: flex; align-items: center; gap: 10px; background: rgba(242,241,249,0.06); border: 1px solid transparent; border-radius: 9px; padding: 9px 10px; cursor: pointer; transition: border-color 0.15s, background 0.15s; }
  .roster-item:hover { background: rgba(242,241,249,0.1); }
  .roster-item.active { border-color: var(--chartreuse); background: rgba(181,204,46,0.08); }
  .roster-item .ri-avatar { width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: #fff; background: var(--violet); object-fit: cover; overflow: hidden; }
  .roster-item .ri-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .roster-item .ri-text { min-width: 0; flex: 1; }
  .roster-item .ri-name { font-size: 13px; font-weight: 500; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .roster-item .ri-role { font-size: 11px; color: rgba(242,241,249,0.6); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .roster-item .ri-del { background: none; border: none; color: rgba(242,241,249,0.45); font-size: 15px; cursor: pointer; padding: 2px 4px; line-height: 1; flex-shrink: 0; }
  .roster-item .ri-del:hover { color: #fff; }
  .add-hire { width: 100%; background: rgba(0,180,164,0.12); border: 1px dashed rgba(0,180,164,0.55); color: var(--teal); border-radius: 9px; padding: 11px; font-family: inherit; font-size: 13px; font-weight: 500; cursor: pointer; transition: background 0.15s; }
  .add-hire:hover { background: rgba(0,180,164,0.2); }

  .editor-head { display: flex; align-items: center; justify-content: space-between; }
  .editor-head .eh-title { font-size: 12px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--teal); }

  .cover-fields { display: flex; flex-direction: column; gap: 16px; }

  .divider { height: 1px; background: rgba(242,241,249,0.12); margin: 2px 0; }

  .download { background: var(--chartreuse); color: var(--anchor); border: none; border-radius: 10px; padding: 15px; font-family: inherit; font-size: 14.5px; font-weight: 600; cursor: pointer; transition: transform 0.1s, filter 0.15s; }
  .download:hover { filter: brightness(1.06); }
  .download:active { transform: scale(0.985); }
  .download.secondary { background: rgba(242,241,249,0.1); color: #fff; }
  .download:disabled { opacity: 0.4; cursor: not-allowed; }
  .actions { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }

  /* ---------- Stage ---------- */
  .stage { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; gap: 16px; }
  .frame { width: min(620px, 100%, calc(100vh - 150px)); aspect-ratio: 1; border-radius: 16px; overflow: hidden; box-shadow: 0 12px 40px rgba(45,38,96,0.18); background: #fff; }
  canvas#card { width: 100%; height: 100%; display: block; }
  .meta { font-size: 12px; color: var(--violet); letter-spacing: 0.3px; text-align: center; }
  .stage-nav { display: flex; align-items: center; gap: 14px; }
  .stage-nav button { background: #fff; border: 1px solid rgba(45,38,96,0.18); color: var(--anchor); width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 18px; transition: background 0.15s; }
  .stage-nav button:hover:not(:disabled) { background: var(--lavender); }
  .stage-nav button:disabled { opacity: 0.35; cursor: not-allowed; }
  .stage-nav .pos { font-size: 13px; color: var(--violet); min-width: 120px; text-align: center; }

  @media (max-width: 880px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { order: 2; }
    .stage { order: 1; padding: 24px 16px; }
  }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <svg class="spark" width="26" height="26" viewBox="0 0 24 24"><path d="M12 0 L14 10 L24 12 L14 14 L12 24 L10 14 L0 12 L10 10 Z" fill="#B5CC2E"/></svg>
      <div>
        <h1>New hire welcome cards</h1>
        <p>CipherHealth · LinkedIn</p>
      </div>
    </div>

    <div class="mode">
      <button id="modeSingle" class="active">Single card</button>
      <button id="modeClass">Create a class</button>
    </div>

    <!-- COVER (class mode only) -->
    <div id="coverPanel" style="display:none;" class="cover-fields">
      <div class="field">
        <label>Cover headline</label>
        <input type="text" id="coverTitle" placeholder="Welcome our newest team members" maxlength="60" autocomplete="off">
      </div>
      <div class="field">
        <label>Cover subtitle <span class="sub">(optional)</span></label>
        <input type="text" id="coverSub" placeholder="Spring 2026 cohort" maxlength="50" autocomplete="off">
      </div>
      <div class="divider"></div>
      <div class="field">
        <label>Class roster</label>
        <div class="roster" id="roster"></div>
        <button class="add-hire" id="addHire" style="margin-top:8px;">+ Add new hire</button>
      </div>
      <div class="divider"></div>
    </div>

    <!-- EDITOR (per-card, both modes) -->
    <div id="editorPanel" style="display:flex; flex-direction:column; gap:22px;">
      <div class="editor-head" id="editorHead" style="display:none;">
        <span class="eh-title" id="editorWho">Hire 1</span>
      </div>

      <div class="field">
        <label>Template</label>
        <div class="templates" id="templates">
          <button class="tpl active" data-tpl="dark"><div class="thumb t-dark"></div><div class="tname">Signature dark</div></button>
          <button class="tpl" data-tpl="light"><div class="thumb t-light"></div><div class="tname">Lavender light</div></button>
          <button class="tpl" data-tpl="split"><div class="thumb t-split"></div><div class="tname">Split panel</div></button>
          <button class="tpl" data-tpl="orbit"><div class="thumb t-orbit"></div><div class="tname">Orbit frame</div></button>
        </div>
      </div>

      <div class="field">
        <label for="name">Name</label>
        <input type="text" id="name" placeholder="Jordan Davis" maxlength="60" autocomplete="off">
      </div>
      <div class="field">
        <label for="role">Role / title</label>
        <input type="text" id="role" placeholder="Senior Client Success Manager" maxlength="80" autocomplete="off">
      </div>
      <div class="field">
        <label for="dept">Team badge <span class="sub">(optional)</span></label>
        <input type="text" id="dept" placeholder="Client success" maxlength="30" autocomplete="off">
      </div>

      <div class="field">
        <label>Photo</label>
        <div class="drop" id="drop">
          <span id="dropEmpty">Drag a headshot here or <strong>browse</strong><br><span style="font-size:11px;opacity:0.6;">JPG or PNG · square crop works best</span></span>
          <div class="preview-row" id="dropFilled" style="display:none;">
            <img id="thumbImg" alt="Uploaded headshot preview">
            <div style="min-width:0;">
              <div class="fname" id="fname"></div>
              <div class="swap">Click to replace</div>
            </div>
            <button class="clear-photo" id="clearPhoto" title="Remove photo" aria-label="Remove photo">&times;</button>
          </div>
        </div>
        <input type="file" id="file" class="file-in" accept="image/*">
        <div class="hint">No photo yet? The card falls back to styled initials.</div>
      </div>
    </div>

    <div class="actions">
      <button class="download" id="downloadPng">Download PNG</button>
      <button class="download secondary" id="downloadPdf" style="display:none;">Download carousel PDF</button>
    </div>
  </aside>

  <main class="stage">
    <div class="frame"><canvas id="card" width="1200" height="1200"></canvas></div>
    <div class="stage-nav" id="stageNav" style="display:none;">
      <button id="navPrev" aria-label="Previous">&#8249;</button>
      <span class="pos" id="navPos">Cover</span>
      <button id="navNext" aria-label="Next">&#8250;</button>
    </div>
    <div class="meta" id="stageMeta">Live preview · exports at full 1200 × 1200 resolution</div>
  </main>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
const C = { anchor:'#2D2660', violet:'#5B4FB5', teal:'#00B4A4', chartreuse:'#B5CC2E', amber:'#E8A020', lavender:'#F2F1F9', tealTint:'#D0F4F1', white:'#FFFFFF' };
const S = 1200;
const PH = { name: 'Jordan Davis', role: 'Senior Client Success Manager' };

/* ---------- model ---------- */
function newCard() { return { tpl:'dark', name:'', role:'', dept:'', img:null, imgSrc:null, fileName:null }; }
const model = {
  mode: 'single',
  single: newCard(),
  class: { coverTitle:'', coverSub:'', hires: [ newCard() ] },
  // preview navigation in class mode: -1 = cover, 0..n-1 = hire index
  view: 0,
  editIndex: 0
};

const canvas = document.getElementById('card');
const ctx = canvas.getContext('2d');

/* ---------- drawing primitives (operate on passed ctx) ---------- */
function initials(name) {
  const parts = (name||'').trim().split(/\s+/).filter(Boolean);
  if (!parts.length) return 'CH';
  if (parts.length === 1) return parts[0].slice(0,2).toUpperCase();
  return (parts[0][0] + parts[parts.length-1][0]).toUpperCase();
}
function mkFit(c) { return function(text, weight, family, maxPx, maxWidth, minPx, italic){ let size=maxPx; while(size>minPx){ c.font=(italic?'italic ':'')+weight+' '+size+'px '+family; if(c.measureText(text).width<=maxWidth) break; size-=2; } return size; }; }
function mkWrap(c) { return function(text, maxWidth, font){ c.font=font; const words=(text||'').split(/\s+/).filter(Boolean); const lines=[]; let line=''; for(const w of words){ const t=line?line+' '+w:w; if(c.measureText(t).width>maxWidth && line){lines.push(line); line=w;} else line=t; } if(line) lines.push(line); return lines; }; }
function sparkle(c,x,y,r,color,ratio){ const inner=r*(ratio||0.18); c.beginPath(); c.moveTo(x,y-r); c.quadraticCurveTo(x+inner*0.4,y-inner,x+r,y); c.quadraticCurveTo(x+inner*0.4,y+inner,x,y+r); c.quadraticCurveTo(x-inner*0.4,y+inner,x-r,y); c.quadraticCurveTo(x-inner*0.4,y-inner,x,y-r); c.closePath(); c.fillStyle=color; c.fill(); }
function circle(c,x,y,r,fill,alpha){ c.save(); if(alpha!==undefined) c.globalAlpha=alpha; c.beginPath(); c.arc(x,y,r,0,Math.PI*2); c.fillStyle=fill; c.fill(); c.restore(); }
function ring(c,x,y,r,stroke,width,alpha){ c.save(); if(alpha!==undefined) c.globalAlpha=alpha; c.beginPath(); c.arc(x,y,r,0,Math.PI*2); c.strokeStyle=stroke; c.lineWidth=width; c.stroke(); c.restore(); }
function roundRect(c,x,y,w,h,r){ c.beginPath(); c.moveTo(x+r,y); c.arcTo(x+w,y,x+w,y+h,r); c.arcTo(x+w,y+h,x,y+h,r); c.arcTo(x,y+h,x,y,r); c.arcTo(x,y,x+w,y,r); c.closePath(); }
function drawCover(c,img,x,y,w,h){ const ir=img.width/img.height, r=w/h; let sw,sh,sx,sy; if(ir>r){ sh=img.height; sw=sh*r; sx=(img.width-sw)/2; sy=0; } else { sw=img.width; sh=sw/r; sx=0; sy=(img.height-sh)*0.25; } c.drawImage(img,sx,sy,sw,sh,x,y,w,h); }
function photoCircle(c,card,cx,cy,r,ringColor,ringW,fbBg,fbFg){ c.save(); c.beginPath(); c.arc(cx,cy,r,0,Math.PI*2); c.clip(); if(card.img){ drawCover(c,card.img,cx-r,cy-r,r*2,r*2); } else { c.fillStyle=fbBg; c.fillRect(cx-r,cy-r,r*2,r*2); c.fillStyle=fbFg; c.font='500 '+Math.round(r*0.62)+'px Inter'; c.textAlign='center'; c.textBaseline='middle'; c.fillText(initials(card.name),cx,cy+r*0.03); } c.restore(); if(ringW) ring(c,cx,cy,r+ringW/2,ringColor,ringW); }
function badgePill(c,text,cx,y,bg,fg){ c.font='500 30px Inter'; const w=c.measureText(text).width+76, h=64; roundRect(c,cx-w/2,y,w,h,h/2); c.fillStyle=bg; c.fill(); c.fillStyle=fg; c.textAlign='center'; c.textBaseline='middle'; c.fillText(text,cx,y+h/2+2); }

function cardVals(card){ return { name:(card.name||'').trim()||PH.name, role:(card.role||'').trim()||PH.role, dept:(card.dept||'').trim() }; }

/* ---------- templates ---------- */
function tplDark(c, card){
  const fit=mkFit(c), v=cardVals(card);
  c.fillStyle=C.anchor; c.fillRect(0,0,S,S);
  circle(c,1180,30,220,C.teal,0.22); circle(c,1010,120,130,C.violet,0.38); circle(c,60,1150,170,C.violet,0.25);
  sparkle(c,120,130,44,C.chartreuse); sparkle(c,1090,980,26,C.teal);
  photoCircle(c,card,S/2,380,190,C.teal,12,C.violet,C.lavender);
  c.textAlign='center'; c.textBaseline='alphabetic';
  c.fillStyle=C.chartreuse; c.font='600 38px Inter'; c.fillText('W E L C O M E   T O   T H E   T E A M',S/2,690);
  const ns=fit(v.name,'600','Inter',96,1000,52); c.fillStyle=C.white; c.font='600 '+ns+'px Inter'; c.fillText(v.name,S/2,800);
  const rs=fit(v.role,'400','Inter',46,1000,30); c.fillStyle='rgba(242,241,249,0.88)'; c.font='400 '+rs+'px Inter'; c.fillText(v.role,S/2,870);
  if(v.dept) badgePill(c,v.dept,S/2,915,C.tealTint,C.anchor);
  c.textAlign='center'; c.textBaseline='alphabetic';
  c.fillStyle='rgba(242,241,249,0.6)'; c.font='italic 500 30px Merriweather'; c.fillText('Every shift. Every unit. Every patient.',S/2,1110);
}
function tplLight(c, card){
  const fit=mkFit(c), wrap=mkWrap(c), v=cardVals(card);
  c.fillStyle=C.lavender; c.fillRect(0,0,S,S);
  circle(c,110,1160,280,C.teal,0.16); circle(c,330,1130,180,C.violet,0.16); circle(c,190,1010,110,C.amber,0.2); circle(c,1170,60,160,C.violet,0.12);
  sparkle(c,1080,180,34,C.teal);
  c.textAlign='left'; c.textBaseline='alphabetic';
  c.fillStyle=C.violet; c.font='600 76px Inter'; c.fillText('Say hello to our',100,220);
  c.font='italic 600 76px Merriweather'; const w1=c.measureText('newest ').width; c.fillText('newest',100,320);
  c.font='600 76px Inter'; c.fillText(' team member',100+w1,320);
  photoCircle(c,card,330,690,215,C.violet,10,C.violet,C.lavender);
  const tx=610, maxW=S-tx-80;
  const ns=fit(v.name,'600','Inter',80,maxW,44); c.fillStyle=C.anchor; c.font='600 '+ns+'px Inter'; c.fillText(v.name,tx,660);
  c.fillStyle=C.violet; const roleFont='400 42px Inter'; const lines=wrap(v.role,maxW,roleFont); c.font=roleFont;
  lines.slice(0,2).forEach((ln,i)=>c.fillText(ln,tx,725+i*56));
  if(v.dept){ c.font='500 30px Inter'; const bw=c.measureText(v.dept).width+76; const by=790+(lines.length>1?56:0); roundRect(c,tx,by,bw,64,32); c.fillStyle=C.tealTint; c.fill(); c.fillStyle=C.anchor; c.textAlign='center'; c.textBaseline='middle'; c.fillText(v.dept,tx+bw/2,by+34); c.textAlign='left'; c.textBaseline='alphabetic'; }
  c.fillStyle=C.anchor; c.font='500 32px Inter'; c.fillText('CipherHealth',100,1120);
  c.fillStyle=C.violet; c.font='italic 500 28px Merriweather'; c.fillText('Every shift. Every unit. Every patient.',320,1120);
}
function tplSplit(c, card){
  const fit=mkFit(c), wrap=mkWrap(c), v=cardVals(card); const split=560;
  c.fillStyle=C.violet; c.fillRect(split,0,S-split,S);
  if(card.img){ c.save(); c.beginPath(); c.rect(split,0,S-split,S); c.clip(); drawCover(c,card.img,split,0,S-split,S); c.restore(); }
  else { circle(c,880,540,230,C.lavender); c.fillStyle=C.violet; c.font='500 150px Inter'; c.textAlign='center'; c.textBaseline='middle'; c.fillText(initials(v.name),880,552); }
  c.fillStyle=C.teal; c.fillRect(split,S-90,S-split,90);
  c.fillStyle=C.anchor; c.fillRect(0,0,split,S);
  circle(c,20,60,130,C.violet,0.35); circle(c,490,1130,150,C.teal,0.2); sparkle(c,110,200,38,C.chartreuse);
  c.textAlign='left'; c.textBaseline='alphabetic'; const lx=80, maxW=split-lx-60;
  c.fillStyle=C.chartreuse; c.font='600 32px Inter'; c.fillText('N O W   O N B O A R D',lx,480);
  const nfs=fit(v.name.split(' ')[0]||v.name,'600','Inter',92,maxW,50); c.fillStyle=C.white; c.font='600 '+nfs+'px Inter';
  const nl=wrap(v.name,maxW,c.font); nl.slice(0,2).forEach((ln,i)=>c.fillText(ln,lx,590+i*(nfs+14)));
  let cy=590+(Math.min(nl.length,2)-1)*(nfs+14)+80;
  c.fillStyle='rgba(242,241,249,0.88)'; const rf='400 38px Inter'; const rl=wrap(v.role,maxW,rf); c.font=rf;
  rl.slice(0,3).forEach((ln,i)=>c.fillText(ln,lx,cy+i*52)); cy+=Math.min(rl.length,3)*52+30;
  c.fillStyle=C.teal; c.fillRect(lx,cy,110,10); cy+=80;
  if(v.dept){ c.font='500 28px Inter'; const bw=c.measureText(v.dept).width+70; roundRect(c,lx,cy-40,bw,60,30); c.fillStyle='rgba(181,204,46,0.16)'; c.fill(); c.strokeStyle=C.chartreuse; c.lineWidth=2; roundRect(c,lx,cy-40,bw,60,30); c.stroke(); c.fillStyle=C.chartreuse; c.textAlign='center'; c.textBaseline='middle'; c.fillText(v.dept,lx+bw/2,cy-8); c.textAlign='left'; c.textBaseline='alphabetic'; }
  c.fillStyle='rgba(242,241,249,0.65)'; c.font='500 26px Inter'; c.fillText('CipherHealth',lx,1120);
}
function tplOrbit(c, card){
  const fit=mkFit(c), v=cardVals(card);
  c.fillStyle=C.lavender; c.fillRect(0,0,S,S);
  sparkle(c,1010,200,40,C.amber); sparkle(c,180,840,30,C.teal); sparkle(c,1060,880,22,C.violet);
  const cx=S/2, cy=430;
  ring(c,cx,cy,320,'rgba(91,79,181,0.4)',8); ring(c,cx,cy,282,'rgba(0,180,164,0.5)',8);
  c.save(); c.beginPath(); c.arc(cx+320*Math.cos(-0.6),cy+320*Math.sin(-0.6),16,0,Math.PI*2); c.fillStyle=C.amber; c.fill(); c.beginPath(); c.arc(cx+282*Math.cos(2.4),cy+282*Math.sin(2.4),13,0,Math.PI*2); c.fillStyle=C.teal; c.fill(); c.restore();
  photoCircle(c,card,cx,cy,235,null,0,C.anchor,C.lavender);
  c.textAlign='center'; c.textBaseline='alphabetic';
  const ns=fit(v.name,'600','Inter',88,1020,48); c.fillStyle=C.anchor; c.font='600 '+ns+'px Inter'; c.fillText(v.name,cx,880);
  const rs=fit(v.role,'500','Merriweather',44,1020,28,true); c.fillStyle=C.violet; c.font='italic 500 '+rs+'px Merriweather'; c.fillText(v.role,cx,950);
  let py=1000; if(v.dept){ badgePill(c,v.dept,cx,py,C.tealTint,C.anchor); py+=84; }
  c.font='500 32px Inter'; const t='Welcome to CipherHealth'; const w=c.measureText(t).width+90; roundRect(c,cx-w/2,py,w,70,35); c.fillStyle=C.anchor; c.fill(); c.fillStyle=C.chartreuse; c.textAlign='center'; c.textBaseline='middle'; c.fillText(t,cx,py+37);
}
const TPLS = { dark:tplDark, light:tplLight, split:tplSplit, orbit:tplOrbit };

/* ---------- cover slide ---------- */
function drawCoverSlide(c, cls){
  const fit=mkFit(c), wrap=mkWrap(c);
  c.fillStyle=C.anchor; c.fillRect(0,0,S,S);
  // tessellated corner circles (staircase) bottom-right
  c.save(); const rr=70;
  for(let row=0; row<4; row++){ for(let col=0; col<=row; col++){ const x=S-rr-col*rr*2; const y=S-rr-row*rr*2; c.globalAlpha=0.10+row*0.05; c.beginPath(); c.arc(x,y,rr,0,Math.PI*2); c.fillStyle=(row%2?C.teal:C.violet); c.fill(); } }
  c.restore();
  circle(c,90,120,150,C.teal,0.18); sparkle(c,170,180,46,C.chartreuse); sparkle(c,1050,250,30,C.teal);
  c.textAlign='left'; c.textBaseline='alphabetic';
  c.fillStyle=C.chartreuse; c.font='600 34px Inter'; c.fillText('C I P H E R H E A L T H',100,300);
  const title=(cls.coverTitle||'').trim()||'Welcome our newest team members';
  const ts=fit(title.length>34?'Welcome our newest':'Welcome','600','Inter',92,1000,60);
  c.fillStyle=C.white; const tf='600 '+ts+'px Inter'; const tl=wrap(title,1000,tf); c.font=tf;
  tl.slice(0,3).forEach((ln,i)=>c.fillText(ln,100,440+i*(ts+18)));
  let y=440+Math.min(tl.length,3)*(ts+18)+10;
  // chartreuse rule
  c.fillStyle=C.chartreuse; c.fillRect(100,y,140,10); y+=70;
  const sub=(cls.coverSub||'').trim();
  if(sub){ c.fillStyle='rgba(242,241,249,0.85)'; c.font='italic 500 40px Merriweather'; c.fillText(sub,100,y); y+=70; }
  const n=cls.hires.length;
  c.fillStyle=C.teal; c.font='500 36px Inter'; c.fillText(n+' new '+(n===1?'colleague':'colleagues')+' joining us',100,y);
  c.fillStyle='rgba(242,241,249,0.55)'; c.font='italic 500 28px Merriweather'; c.fillText('Every shift. Every unit. Every patient.',100,1120);
}

/* ---------- render one card into any context ---------- */
function renderCard(c, card){ c.clearRect(0,0,S,S); c.textAlign='left'; c.textBaseline='alphabetic'; (TPLS[card.tpl]||tplDark)(c, card); }

/* ---------- preview ---------- */
function activeEditCard(){ return model.mode==='single' ? model.single : model.class.hires[model.editIndex]; }
function drawPreview(){
  if(model.mode==='single'){ renderCard(ctx, model.single); return; }
  if(model.view === -1){ ctx.clearRect(0,0,S,S); drawCoverSlide(ctx, model.class); }
  else { renderCard(ctx, model.class.hires[model.view]); }
}

/* ---------- UI sync ---------- */
const el = id => document.getElementById(id);
function syncTemplateButtons(tpl){ document.querySelectorAll('.tpl').forEach(b=>b.classList.toggle('active', b.dataset.tpl===tpl)); }
function syncPhotoUI(card){
  if(card.imgSrc){ el('thumbImg').src=card.imgSrc; el('fname').textContent=card.fileName||'photo'; el('dropEmpty').style.display='none'; el('dropFilled').style.display='flex'; }
  else { el('dropEmpty').style.display=''; el('dropFilled').style.display='none'; }
}
function syncEditor(){
  const card=activeEditCard();
  el('name').value=card.name; el('role').value=card.role; el('dept').value=card.dept;
  syncTemplateButtons(card.tpl); syncPhotoUI(card);
  if(model.mode==='class'){ el('editorHead').style.display='flex'; el('editorWho').textContent='Editing hire '+(model.editIndex+1); }
  else el('editorHead').style.display='none';
}
function renderRoster(){
  const r=el('roster'); r.innerHTML='';
  model.class.hires.forEach((h,i)=>{
    const v=cardVals(h);
    const item=document.createElement('div');
    item.className='roster-item'+(i===model.editIndex?' active':'');
    const av=document.createElement('div'); av.className='ri-avatar';
    if(h.imgSrc){ const im=document.createElement('img'); im.src=h.imgSrc; av.appendChild(im); } else av.textContent=initials(h.name);
    const tx=document.createElement('div'); tx.className='ri-text';
    tx.innerHTML='<div class="ri-name">'+escapeHtml(v.name)+'</div><div class="ri-role">'+escapeHtml(v.role)+'</div>';
    const del=document.createElement('button'); del.className='ri-del'; del.innerHTML='&times;'; del.title='Remove'; del.setAttribute('aria-label','Remove hire');
    del.addEventListener('click', e=>{ e.stopPropagation(); removeHire(i); });
    item.appendChild(av); item.appendChild(tx); if(model.class.hires.length>1) item.appendChild(del);
    item.addEventListener('click', ()=>{ model.editIndex=i; model.view=i; syncEditor(); renderRoster(); drawPreview(); updateNav(); });
    r.appendChild(item);
  });
}
function escapeHtml(s){ return (s||'').replace(/[&<>"]/g, ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch])); }

function updateNav(){
  if(model.mode==='single'){ el('stageNav').style.display='none'; el('stageMeta').textContent='Live preview · exports at full 1200 × 1200 resolution'; return; }
  el('stageNav').style.display='flex';
  const n=model.class.hires.length;
  el('navPos').textContent = model.view===-1 ? 'Cover slide' : ('Hire '+(model.view+1)+' of '+n);
  el('navPrev').disabled = model.view===-1;
  el('navNext').disabled = model.view===n-1;
  el('stageMeta').textContent = (n+1)+'-page carousel · cover + '+n+' '+(n===1?'card':'cards');
}

/* ---------- mode switching ---------- */
function setMode(m){
  model.mode=m;
  el('modeSingle').classList.toggle('active', m==='single');
  el('modeClass').classList.toggle('active', m==='class');
  el('coverPanel').style.display = m==='class' ? 'flex' : 'none';
  el('downloadPng').style.display = '';
  el('downloadPng').textContent = m==='class' ? 'Download current card PNG' : 'Download PNG';
  el('downloadPdf').style.display = m==='class' ? '' : 'none';
  if(m==='class'){ model.view=Math.min(model.editIndex, model.class.hires.length-1); renderRoster(); }
  syncEditor(); updateNav(); drawPreview();
}

/* ---------- roster ops ---------- */
function addHire(){ model.class.hires.push(newCard()); model.editIndex=model.class.hires.length-1; model.view=model.editIndex; renderRoster(); syncEditor(); updateNav(); drawPreview(); }
function removeHire(i){ if(model.class.hires.length<=1) return; model.class.hires.splice(i,1); if(model.editIndex>=model.class.hires.length) model.editIndex=model.class.hires.length-1; model.view=Math.min(model.view, model.class.hires.length-1); if(model.view<0) model.view=0; renderRoster(); syncEditor(); updateNav(); drawPreview(); }

/* ---------- input wiring ---------- */
el('modeSingle').addEventListener('click', ()=>setMode('single'));
el('modeClass').addEventListener('click', ()=>setMode('class'));
el('addHire').addEventListener('click', addHire);
el('coverTitle').addEventListener('input', e=>{ model.class.coverTitle=e.target.value; if(model.view===-1) drawPreview(); });
el('coverSub').addEventListener('input', e=>{ model.class.coverSub=e.target.value; if(model.view===-1) drawPreview(); });

document.getElementById('templates').addEventListener('click', e=>{ const b=e.target.closest('.tpl'); if(!b) return; activeEditCard().tpl=b.dataset.tpl; syncTemplateButtons(b.dataset.tpl); if(model.mode==='class'){ model.view=model.editIndex; renderRoster(); } drawPreview(); updateNav(); });

['name','role','dept'].forEach(id=>{ el(id).addEventListener('input', e=>{ activeEditCard()[id]=e.target.value; if(model.mode==='class'){ if(model.view!==model.editIndex){ model.view=model.editIndex; } renderRoster(); updateNav(); } drawPreview(); }); });

const drop=el('drop'), file=el('file');
drop.addEventListener('click', e=>{ if(e.target.id==='clearPhoto') return; file.click(); });
drop.addEventListener('dragover', e=>{ e.preventDefault(); drop.classList.add('over'); });
drop.addEventListener('dragleave', ()=>drop.classList.remove('over'));
drop.addEventListener('drop', e=>{ e.preventDefault(); drop.classList.remove('over'); if(e.dataTransfer.files.length) loadPhoto(e.dataTransfer.files[0]); });
file.addEventListener('change', ()=>{ if(file.files.length) loadPhoto(file.files[0]); });
el('clearPhoto').addEventListener('click', e=>{ e.stopPropagation(); const card=activeEditCard(); card.img=null; card.imgSrc=null; card.fileName=null; file.value=''; syncPhotoUI(card); if(model.mode==='class'){ model.view=model.editIndex; renderRoster(); } drawPreview(); });

function loadPhoto(f){ if(!f.type.startsWith('image/')) return; const card=activeEditCard(); const reader=new FileReader(); reader.onload=ev=>{ const img=new Image(); img.onload=()=>{ card.img=img; card.imgSrc=ev.target.result; card.fileName=f.name; syncPhotoUI(card); if(model.mode==='class'){ model.view=model.editIndex; renderRoster(); } drawPreview(); }; img.src=ev.target.result; }; reader.readAsDataURL(f); }

el('navPrev').addEventListener('click', ()=>{ if(model.view>-1){ model.view--; drawPreview(); updateNav(); } });
el('navNext').addEventListener('click', ()=>{ if(model.view<model.class.hires.length-1){ model.view++; drawPreview(); updateNav(); } });

/* ---------- exports ---------- */
el('downloadPng').addEventListener('click', ()=>{
  // export the currently-previewed card (or active edit card in single)
  let card, off;
  if(model.mode==='single'){ card=model.single; }
  else if(model.view===-1){ off=document.createElement('canvas'); off.width=off.height=S; drawCoverSlide(off.getContext('2d'), model.class); downloadCanvas(off, 'cipherhealth-welcome-cover'); return; }
  else card=model.class.hires[model.view];
  off=document.createElement('canvas'); off.width=off.height=S; renderCard(off.getContext('2d'), card);
  downloadCanvas(off, 'cipherhealth-welcome-'+slug(cardVals(card).name));
});
function downloadCanvas(cv, base){ const a=document.createElement('a'); a.download=base+'.png'; a.href=cv.toDataURL('image/png'); a.click(); }
function slug(s){ return (s||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')||'new-hire'; }

el('downloadPdf').addEventListener('click', ()=>{
  const btn=el('downloadPdf'); btn.disabled=true; const orig=btn.textContent; btn.textContent='Building PDF…';
  setTimeout(()=>{
    try{
      const { jsPDF } = window.jspdf;
      const PT = 1080; // points; square page
      const pdf = new jsPDF({ orientation:'portrait', unit:'pt', format:[PT,PT] });
      const off=document.createElement('canvas'); off.width=off.height=S; const oc=off.getContext('2d');
      // cover
      drawCoverSlide(oc, model.class);
      pdf.addImage(off.toDataURL('image/jpeg',0.92),'JPEG',0,0,PT,PT);
      // hires
      model.class.hires.forEach(h=>{ renderCard(oc,h); pdf.addPage([PT,PT],'portrait'); pdf.addImage(off.toDataURL('image/jpeg',0.92),'JPEG',0,0,PT,PT); });
      pdf.save('cipherhealth-welcome-class.pdf');
    } finally { btn.disabled=false; btn.textContent=orig; }
  }, 40);
});

/* ---------- init ---------- */
function init(){ syncEditor(); updateNav(); drawPreview(); }
init();
if(document.fonts && document.fonts.ready){
  Promise.all([ document.fonts.load('600 96px Inter'), document.fonts.load('400 46px Inter'), document.fonts.load('italic 500 44px Merriweather') ]).then(drawPreview).catch(drawPreview);
  document.fonts.ready.then(()=>{ drawPreview(); if(model.mode==='class') renderRoster(); });
}
</script>
</body>
</html>
